<div class="glide" style="width: 100%; max-height: 400px">
  <div class="glide__track" data-glide-el="track">
    <ul class="glide__slides">
      <li
        class="glide__slide slide-wrapper"
        *ngFor="let image of images; let i = index"
      >
        <!-- Image fills the slide -->
        <img
          *ngIf="image?.photo?.url || image?.url"
          [src]="image?.photo?.url || image?.url"
          class="slide-img"
        />

        <!-- Download button overlaid on top-right corner of the image -->
        <button
          class="download-btn"
          (click)="downloadImage(image, i)"
          [disabled]="downloadingIndex === i"
          aria-label="Télécharger l'image"
        >
          <!-- Spinner while downloading -->
          <ng-container *ngIf="downloadingIndex === i; else downloadIcon">
            <svg
              class="spinner"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </ng-container>

          <!-- Download icon -->
          <ng-template #downloadIcon>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 15V3"/>
              <path d="M7 10l5 5 5-5"/>
              <path d="M20 21H4"/>
            </svg>
          </ng-template>
        </button>
      </li>
    </ul>
  </div>
</div>
